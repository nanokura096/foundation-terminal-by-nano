<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCP FOUNDATION SECURE TERMINAL</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen">
  <div id="loginBox">
    <div id="loginTitle">
      SECURITY AUTHENTICATION REQUIRED<br>
      <span>SCP FOUNDATION DATABASE TERMINAL</span>
    </div>
    <input id="username" placeholder="[USER ID]">
    <input id="password" type="password" placeholder="[PASS KEY]">
    <button id="loginBtn">ACCESS DATABASE</button>
    <div id="loginError"></div>
  </div>
</div>

<div id="bootScreen"></div>

<div id="amnesticOverlay">
  <h1>[MEMETIC LOCKDOWN]</h1>
  <p>UNAUTHORIZED ACCESS DETECTED.</p>
  <div class="blink warning">⚠</div>
  <p>ADMINISTERING CLASS-A AMNESTICS...</p>
</div>

<div id="emergencyOverlay">
  <div id="emergencyContent">
    <div id="emergencyMsg"></div>
    <div id="emergencyChoices"></div>
  </div>
</div>

<div id="mainTerminal">
  <div id="logo">SCP FOUNDATION SECURE TERMINAL / SITE-256</div>
  <div id="statusbar"></div>

  <div class="inputArea">
    <input id="staffId" placeholder="Enter Personnel ID or SCP ID">
    <select id="clearance">
      <option value="0">LV 0</option>
      <option value="1">LV 1</option>
      <option value="2">LV 2</option>
      <option value="3" selected>LV 3</option>
      <option value="4">LV 4</option>
      <option value="5">LV 5</option>
    </select>
    <button id="searchBtn">SEARCH DATABASE</button>
  </div>

  <div id="tabs">
    <button data-tab="personnel">PERSONNEL</button>
    <button data-tab="ability">PROFILE</button>
    <button data-tab="artifact">SCP</button>
    <button data-tab="record">RECORD</button>
  </div>

  <div id="result"></div>

  <div id="staffListTitle">▼ Show All Registered Personnel</div>
  <div id="staffList"></div>

  <div class="bottom-controls">
    <button class="emergency-btn" id="emergencyBtn">REPORT CONTAINMENT BREACH</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
